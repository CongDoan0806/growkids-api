name: CI - Lint & Build

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev", "release/**", "main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma client
        run: npx prisma generate
      
      - name: Run linting
        run: npm run lint
      
      - name: Build application
        run: npm run build
